<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reason</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Background image will be set by JavaScript */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .reason-container {
            background-color: rgba(255, 255, 255, 0.6);
            padding: 20px;
            border-radius: 10px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .reason-text {
            font-size: 19px;
            line-height: 1.5;
            font-weight: bold;
            color: #000;
            margin-bottom: 0;
    white-space: pre-line; /* allows \n line breaks */
        }
        
        .reason-date {
            font-size: 16px;
    color: #000;
    margin-top: 8px;
    margin-bottom: 12px;
        }
        
        .day-number {
            font-size: 14px;
            color: #000;
            margin-bottom: 15px;
        }
        
        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="background" id="background">
        <div class="reason-container">
<div class="reason-text" id="reasonText">Loading your reason for today...</div>
<div class="reason-date" id="reasonDate">Loading...</div>
<div class="day-number" id="dayNumber">Day 1 of 110</div>
            <a href="#" id="backButton" class="back-button">Обратно</a>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const TOTAL_DAYS = 110;

  // --- Parse "2 января 2023" style dates safely ---
  function parseRussianDate(s) {
    if (!s) return null;
    let str = String(s).trim().toLowerCase();

    // Fix common typos / variations
    str = str.replace(/октрябр[ья]/g, 'октября'); // catches "октрября"
    str = str.replace(/\s+/g, ' ');

    const monthMap = {
      'января': 0, 'февраля': 1, 'марта': 2, 'апреля': 3, 'мая': 4, 'июня': 5,
      'июля': 6, 'августа': 7, 'сентября': 8, 'октября': 9, 'ноября': 10, 'декабря': 11,
    };

    const m = str.match(/^(\d{1,2})\s+([а-яё]+)\s+(\d{4})$/i);
    if (!m) return null;

    const day = parseInt(m[1], 10);
    const monthName = m[2];
    const year = parseInt(m[3], 10);
    const month = monthMap[monthName];

    if (month === undefined) return null;
    return new Date(year, month, day); // local midnight
  }

  // --- Your principles list ---
  // KEEP your current array here (I’m keeping the same one you already have in reason.html)
  const reasons = [
    { text: "Смотреть в одном направлении", learned: "2 января 2023" },
    { text: "Строить жизнь кирпичик за кирпичиком, укрепляя фундамент.", learned: "3 января 2024" },
    { text: "Есть драники", learned: "18 апреля 2025" },
    { text: "Не прятаться за маской", learned: "27 октября 2023" },
    { text: "Подзаряжать батарейки где угодно", learned: "4 марта 2025" },
    { text: "Верить своему инстинкту", learned: "13 февраля 2026" },
    { text: "Делать любое место интереснее, находясь там вместе", learned: "9 октября 2023" },
    { text: "Наслаждаться солнцем", learned: "28 марта 2025" },
    { text: "Принимать, что в каждом живёт немного бабушки", learned: "12 декабря 2023" },
    { text: "Быть самыми нарядными даже в Италии", learned: "7 октября 2023" },
    { text: "Задавать вопросы", learned: "2 ноября 2024" },
    { text: "Чувствовать, что весь мир у наших ног", learned: "23 октября 2023" },
    { text: "Позволять себе сладкое", learned: "9 марта 2024" },
    { text: "Быть в унисон", learned: "4 января 2026" },
    { text: "Не чинить то, что и так отлично работает", learned: "8 октября 2023" },
    { text: "Проявлять креативность", learned: "15 февраля 2025" },
    { text: "Осознать, кто в семье лучше поёт патриотические песни", learned: "9 мая 2023" },
    { text: "Не терять свою идентичность", learned: "18 мая 2025" },
    { text: "Наслаждаться концертом даже под дождём", learned: "7 июля 2023" },
    { text: "Планировать далёкое будущее вместе", learned: "28 февраля 2025" },
    { text: "Делить сладкое или рисковать стать «диабетиками счастья»", learned: "15 марта 2024" },
    { text: "Быть гибкими", learned: "1 декабря 2024" },
    { text: "Меп Меп Ма Меп", learned: "20 сентября 2023" },
    { text: "Поддерживать друг друга", learned: "9 ноября 2025" },
    { text: "Не судить поспешно — ни по обложке, ни по размеру крысы", learned: "10 марта 2024" },
    { text: "Говорить «да»", learned: "24 мая 2025" },
    { text: "Терять чемоданы, но сохранять воспоминания:", learned: "2 октября 2023" },
    { text: "Стоять друг за друга горой", learned: "24 февраля 2024" },
    { text: "Любоваться так, будто впереди миллиард лет", learned: "17 сентября 2023" },
    { text: "Отдыхать", learned: "26 декабря 2024" },
    { text: "Проверять источник своей еды", learned: "31 декабря 2023" },
    { text: "Быть на природе вместе", learned: "11 мая 2025" },
    { text: "Давать волю своей безуминке", learned: "15 июля 2024" },
    { text: "Помнить, кто номер один", learned: "27 декабря 2023" },
    { text: "Знать, когда двигаться дальше", learned: "17 декабря 2024" },
    { text: "Сохранять детское воображение", learned: "25 февраля 2024" },
    { text: "Быть в форме для путешествий", learned: "2 октября 2023" },
    { text: "Искать двери там, где другие их не видят", learned: "26 мая 2025" },
    { text: "Принимать своего внутреннего енота", learned: "15 февраля 2025" },
    { text: "Наслаждаться покоем", learned: "28 сентября 2023" },
    { text: "Оценить тук-тук как крутой вид транспорта", learned: "27 декабря 2023" },
    { text: "Не считать себя единственным источником энергии", learned: "19 марта 2024" },
    { text: "Баловать себя", learned: "17 января 2026" },
    { text: "Защищать слабых", learned: "10 октября 2023" },
    { text: "Интересоваться тем, что интересно другому", learned: "26 марта 2024" },
    { text: "Принимать свои несовершенства", learned: "2 января 2026" },
    { text: "Не отказываться от хорошей еды", learned: "7 марта 2024" },
    { text: "Видеть красоту глазами любви", learned: "24 января 2024" },
    { text: "Любить спонтанность", learned: "25 декабря 2024" },
    { text: "Ладить с (заслуживающими этого) родственниками", learned: "7 ноября 2022" },
    { text: "Заниматься спортом", learned: "8 сентября 2024" },
    { text: "Делать фильм из своей жизни", learned: "10 апреля 2025" },
    { text: "Чтобы подняться на седьмое небо, иногда достаточно четырёх минут", learned: "26 февраля 2023" },
    { text: "Уважать всех", learned: "30 декабря 2024" },
    { text: "Не скрывать свои убеждения и веру", learned: "7 января 2025" },
    { text: "Создавать моменты для двоих — даже в своей «пещере»", learned: "1 марта 2024" },
    { text: "Признавать, что иногда больше — действительно лучше", learned: "16 октября 2023" },
    { text: "Знать, когда сказать «стоп»", learned: "14 декабря 2024" },
    { text: "Оставаться в сердце, даже когда с глаз долой", learned: "8 января 2023" },
    { text: "Веселиться без алкоголя", learned: "18 мая 2025" },
    { text: "Позволять морю успокаивать волнения", learned: "10 октября 2023" },
    { text: "Принимать странные увлечения партнёра", learned: "16 марта 2024" },
    { text: "Смеяться даже над сложными темами", learned: "19 февраля 2026" },
    { text: "Быть как два желтка в одной глазунье", learned: "30 октября 2025" },
    { text: "Помнить, что лучшая вечеринка может случиться дома", learned: "31 декабря 2022" },
    { text: "Социализироваться", learned: "9 мая 2024" },
    { text: "Менять телефон, но сохранять хорошие привычки", learned: "20 декабря 2023" },
    { text: "Путешествовать налегке", learned: "13 апреля 2025" },
    { text: "Не пытаться скрыться от орлиного взгляда", learned: "7 февраля 2024" },
    { text: "Придумывать милые прозвища", learned: "5 октября 2024" },
    { text: "Действовать быстро и без стресса", learned: "5 декабря 2024" },
    { text: "Быть единодушными в важных философских вопросах - например, как относиться к животным", learned: "28 декабря 2022" },
    { text: "Кататься", learned: "3 апреля 2025" },
    { text: "Принимать своего внутреннего неандертальца", learned: "1 марта 2025" },
    { text: "Признать, когда ты слишком большой для корзины", learned: "16 июля 2023" },
    { text: "Находить красоту в повседневном", learned: "16 марта 2025" },
    { text: "Говорить в отелях, что мы отмечаем годовщину", learned: "7 июня 2024" },
    { text: "Не стесняться друг друга", learned: "1 марта 2025" },
    { text: "Ценить простые радости", learned: "5 октября 2023" },
    { text: "Развивать здравый смысл", learned: "19 июня 2025" },
    { text: "Сесть и оценить, чего уже достиг", learned: "29 марта 2025" },
    { text: "Принимать неожиданность как соль жизни", learned: "16 марта 2024" },
    { text: "Быть терпеливыми, но иногда позволять себе не сдерживаться", learned: "7 февраля 2024" },
    { text: "Помогать осуществлять подростковые мечты", learned: "30 марта 2025" },
    { text: "Выбирать не лёгкий путь, а запоминающийся", learned: "3 октября 2023" },
    { text: "Действовать, даже не зная, к чему это приведёт", learned: "20 декабря 2025" },
    { text: "Посылать любовь даже на расстоянии", learned: "21 января 2025" },
    { text: "Заботиться о себе", learned: "24 февраля 2024" },
    { text: "Открывать свою сумку Пандоры", learned: "4 октября 2023" },
    { text: "Обнимать любимых", learned: "5 января 2025" },
    { text: "Идти и покорять", learned: "23 марта 2025" },
    { text: "Быть рядом с теми, с кем по-настоящему хорошо", learned: "26 июля 2025" },
    { text: "Озознать, кому принадлежит твёрдый знак", learned: "30 декабря 2023" },
    { text: "Выходить из зоны комфорта", learned: "10 мая 2025" },
    { text: "Позволить жизни быть как фейерверк", learned: "16 сентября 2023" },
    { text: "Ту зиро Ту Ту", learned: "28 декабря 2023" },
    { text: "Забывать страхи и переходить через мост", learned: "1 мая 2025" },
    { text: "Добиваться всего вместе", learned: "31 июля 2023" },
    { text: "Находить общие интересы", learned: "6 марта 2025" },
    { text: "Помнить, что не только постельный спорт приятен", learned: "4 октября 2023" },
    { text: "Иногда «случайно» забирать гостиничные тапочки", learned: "2 ноября 2024" },
    { text: "Смотреть вперёд — особенно на неровный тротуар", learned: "2 июля 2024" },
    { text: "Быть любознательными и стремиться к новым знаниям", learned: "4 мая 2025" },
    { text: "Жить так, будто ты в своём элементе в пятизвёздочном отеле", learned: "11 ноября 2022" },
    { text: "Верить в свою удачу", learned: "19 сентября 2023" },
    { text: "Отмечать каждую маленькую победу", learned: "22 февраля 2025" },
    { text: "Позволять расстоянию усиливать радость встречи", learned: "9 октября 2024" },
    { text: "Не терять детский восторг", learned: "17 февраля 2024" },
    { text: "В саванне идти в туалет с фонариком", learned: "29 декабря 2024" },
    { text: "Чувствовать, будто в мире есть только мы двое", learned: "16 марта 2024" }
  ];

  // --- Read URL params ---
  const urlParams = new URLSearchParams(window.location.search);
  const dayIndexRaw = parseInt(urlParams.get('day'), 10); // 0-based
  const dayIndex = Number.isInteger(dayIndexRaw) ? dayIndexRaw : 0;

  // Elements
  const reasonTextEl = document.getElementById('reasonText');
  const reasonDateEl = document.getElementById('reasonDate');
  const dayNumberEl  = document.getElementById('dayNumber');

  // Day counter
  dayNumberEl.textContent = `Принцип ${dayIndex + 1} из ${TOTAL_DAYS}`;

  // Show reason
  if (dayIndex >= 0 && dayIndex < reasons.length) {
    const r = reasons[dayIndex];

    const learnedDate = parseRussianDate(r.learned);
    const learnedFormatted = learnedDate
      ? learnedDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })
      : (r.learned ? String(r.learned) : "");

    reasonTextEl.textContent = r.text + (learnedFormatted ? "\n" + learnedFormatted : "");
    reasonDateEl.textContent = ""; // not used
  } else {
    reasonTextEl.textContent = `Reason not found. Please make sure you've added all ${TOTAL_DAYS} items.`;
    reasonDateEl.textContent = "";
  }

  // --- Day-based selfie background: 1.jpeg, 2.jpeg, ... ---
  const bgEl = document.getElementById('background');
  if (bgEl) {
    const selfieFile = `selfies/${dayIndex + 1}.jpeg`;

    // Immediate fallback to avoid white screen
    bgEl.style.backgroundImage = `url('background.jpg')`;

    const img = new Image();
    img.onload = () => { bgEl.style.backgroundImage = `url('${selfieFile}')`; };
    img.onerror = () => { bgEl.style.backgroundImage = `url('background.jpg')`; };
    img.src = selfieFile;
  }

  // Back button (always works)
  const backButton = document.getElementById('backButton');
  backButton.addEventListener('click', function (e) {
    e.preventDefault();

    const dateStr = urlParams.get('date');
    if (dateStr) {
      const d = new Date(dateStr);
      window.location.href = `success.html?month=${d.getMonth()}&year=${d.getFullYear()}`;
    } else {
      window.location.href = 'success.html';
    }
  });
});
</script>
</body>
</html>
